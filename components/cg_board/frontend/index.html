<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chessground Streamlit Component</title>
  <link rel="stylesheet" href="./vendor/chessground.base.css" />
  <link rel="stylesheet" href="./vendor/chessground.brown.css" />
  <link rel="stylesheet" href="./vendor/chessground.cburnett.css" />
  <script src="./vendor/chessground.min.js"></script>
  <script src="./vendor/chess.min.js"></script>
  <style>
    :root {
      --card-bg: rgba(247, 242, 233, 0.95);
      --panel-text: #2a231b;
      --panel-muted: #6b5d50;
      --accent: #0f766e;
      --shadow: 0 8px 28px rgba(47, 36, 24, 0.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      padding: 0;
    }

    #wrap {
      width: 100%;
      box-sizing: border-box;
    }

    #card {
      background: var(--card-bg);
      border: 1px solid rgba(97, 81, 62, 0.16);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 10px;
      position: relative;
      overflow: hidden;
    }

    #board {
      width: 100%;
      min-height: 280px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--panel-muted);
      line-height: 1.3;
      min-height: 16px;
      word-break: break-word;
    }

    #promoteOverlay {
      position: absolute;
      inset: 10px;
      background: rgba(23, 18, 14, 0.58);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 10px;
      backdrop-filter: blur(1px);
    }

    .promoteCard {
      background: #f7f3ec;
      border: 1px solid rgba(87, 70, 54, 0.18);
      border-radius: 14px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.18);
      padding: 10px;
      min-width: 220px;
    }

    .promoteTitle {
      color: var(--panel-text);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .promoteButtons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .promoteButtons button,
    .promoteFooter button {
      border: 1px solid rgba(86, 70, 55, 0.22);
      background: white;
      color: var(--panel-text);
      border-radius: 10px;
      padding: 8px 0;
      cursor: pointer;
      font-weight: 600;
      transition: transform 100ms ease, background 100ms ease;
    }

    .promoteButtons button:hover,
    .promoteFooter button:hover {
      background: #f0eadf;
      transform: translateY(-1px);
    }

    .promoteButtons button:focus,
    .promoteFooter button:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .promoteFooter {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="card">
      <div id="board"></div>
      <div id="promoteOverlay" role="dialog" aria-modal="true" aria-label="Choose promotion piece">
        <div class="promoteCard">
          <div class="promoteTitle">Choose promotion</div>
          <div class="promoteButtons">
            <button data-piece="q" type="button">Q</button>
            <button data-piece="r" type="button">R</button>
            <button data-piece="b" type="button">B</button>
            <button data-piece="n" type="button">N</button>
          </div>
          <div class="promoteFooter">
            <button id="promoteCancel" type="button">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <div id="status"></div>
  </div>

  <script>
    const Streamlit = window.Streamlit || {
      RENDER_EVENT: "streamlit:render",
      events: {
        addEventListener: function (eventName, callback) {
          window.addEventListener("message", function (event) {
            const data = event && event.data;
            if (!data || typeof data !== "object") return;
            if (data.type !== eventName) return;
            callback({ detail: data });
          });
        },
      },
      setComponentReady: function () {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:componentReady",
            apiVersion: 1,
          },
          "*"
        );
      },
      setFrameHeight: function (height) {
        const resolvedHeight =
          Number.isFinite(height) && height > 0
            ? Math.floor(height)
            : Math.max(
                100,
                Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || 0)
              );
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:setFrameHeight",
            height: resolvedHeight,
          },
          "*"
        );
      },
      setComponentValue: function (value) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:setComponentValue",
            value: value,
          },
          "*"
        );
      },
    };
    const ChessgroundFactory =
      (window.Chessground && typeof window.Chessground.Chessground === "function")
        ? window.Chessground.Chessground
        : (typeof window.Chessground === "function" ? window.Chessground : null);
    const ChessCtor = window.Chess;

    const wrapEl = document.getElementById("wrap");
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const overlayEl = document.getElementById("promoteOverlay");
    const promoteCancelEl = document.getElementById("promoteCancel");
    const promoteButtons = Array.from(document.querySelectorAll(".promoteButtons button"));

    let ground = null;
    let game = ChessCtor ? new ChessCtor() : null;
    let currentProps = {
      orientation: "white",
      disabled: false,
      arrows: [],
      last_move_uci: "",
      instance_id: 0,
    };
    let suppressMoveCallbacks = false;
    let moveSeq = 0;
    let lastSentMoveKey = null;
    let pendingPromotion = null;
    let hasRenderedOnce = false;
    let lastSentSizeKey = null;

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function callMaybe(obj, names) {
      for (const name of names) {
        if (obj && typeof obj[name] === "function") return obj[name].bind(obj);
      }
      return null;
    }

    function gameMovesVerbose() {
      try {
        return game ? game.moves({ verbose: true }) : [];
      } catch (_) {
        return [];
      }
    }

    function gameTurn() {
      if (!game) return "w";
      const fn = callMaybe(game, ["turn"]);
      return fn ? fn() : "w";
    }

    function gameFen() {
      if (!game) return "";
      const fn = callMaybe(game, ["fen"]);
      return fn ? fn() : "";
    }

    function gameLoadFen(fen) {
      if (!game) return false;
      const fn = callMaybe(game, ["load"]);
      return fn ? !!fn(fen) : false;
    }

    function gameGet(square) {
      const fn = callMaybe(game, ["get"]);
      return fn ? fn(square) : null;
    }

    function gameInCheck() {
      const fn = callMaybe(game, ["inCheck", "in_check", "isCheck"]);
      return fn ? !!fn() : false;
    }

    function squareFromCoords(file, rank) {
      return "abcdefgh"[file] + "12345678"[rank];
    }

    function kingSquareForTurnFromBoardMatrix() {
      const fn = callMaybe(game, ["board"]);
      if (!fn) return null;
      try {
        const matrix = fn();
        const turn = gameTurn();
        for (let row = 0; row < 8; row += 1) {
          for (let col = 0; col < 8; col += 1) {
            const piece = matrix[row][col];
            if (piece && piece.type === "k" && piece.color === turn) {
              const rank = 7 - row;
              const file = col;
              return squareFromCoords(file, rank);
            }
          }
        }
      } catch (_) {
        return null;
      }
      return null;
    }

    function currentCheckSquare() {
      if (!gameInCheck()) return undefined;
      return kingSquareForTurnFromBoardMatrix() || undefined;
    }

    function uciToMoveTuple(uci) {
      if (!uci || typeof uci !== "string" || uci.length < 4) return undefined;
      return [uci.slice(0, 2), uci.slice(2, 4)];
    }

    function sanitizeArrow(arrow) {
      if (!arrow || typeof arrow !== "object") return null;
      if (typeof arrow.orig !== "string" || typeof arrow.dest !== "string") return null;
      return {
        orig: arrow.orig.slice(0, 2),
        dest: arrow.dest.slice(0, 2),
        brush: typeof arrow.brush === "string" ? arrow.brush : "green",
      };
    }

    function autoShapesFromProps() {
      const shapes = [];
      if (Array.isArray(currentProps.arrows)) {
        for (const a of currentProps.arrows) {
          const s = sanitizeArrow(a);
          if (s) shapes.push(s);
        }
      }
      return shapes;
    }

    function computeDests() {
      const dests = new Map();
      if (!game || currentProps.disabled) return dests;
      for (const m of gameMovesVerbose()) {
        if (!dests.has(m.from)) dests.set(m.from, []);
        dests.get(m.from).push(m.to);
      }
      return dests;
    }

    function sendBoardSizeEvent(sidePx) {
      const side = Math.max(1, Math.floor(sidePx || 0));
      const instanceId = Number(currentProps.instance_id) || 0;
      const sizeKey = instanceId + "|" + side;
      if (sizeKey === lastSentSizeKey) return;
      lastSentSizeKey = sizeKey;
      if (!Streamlit || typeof Streamlit.setComponentValue !== "function") return;
      Streamlit.setComponentValue({
        instance_id: instanceId,
        prev_fen: null,
        fen: gameFen(),
        uci: null,
        san: null,
        seq: ++moveSeq,
        kind: "size",
        board_px: side,
      });
    }

    function resizeBoardAndFrame() {
      const width = Math.max(280, Math.floor(boardEl.clientWidth || wrapEl.clientWidth || 520));
      boardEl.style.width = "100%";
      boardEl.style.height = width + "px";
      const actualSide = Math.max(1, Math.floor(boardEl.getBoundingClientRect().height || width));
      if (ground && typeof ground.redrawAll === "function") {
        ground.redrawAll();
      }
      if (Streamlit && typeof Streamlit.setFrameHeight === "function") {
        Streamlit.setFrameHeight();
      }
      sendBoardSizeEvent(actualSide);
    }

    function syncGround() {
      if (!ground || !game) return;
      suppressMoveCallbacks = true;
      ground.set({
        fen: gameFen(),
        orientation: currentProps.orientation === "black" ? "black" : "white",
        turnColor: gameTurn() === "w" ? "white" : "black",
        check: currentCheckSquare(),
        lastMove: uciToMoveTuple(currentProps.last_move_uci),
        movable: {
          color: currentProps.disabled ? undefined : (gameTurn() === "w" ? "white" : "black"),
          free: false,
          dests: computeDests(),
          showDests: true,
        },
        draggable: {
          enabled: !currentProps.disabled,
        },
        premovable: {
          enabled: false,
        },
        drawable: {
          enabled: false,
          visible: true,
          autoShapes: autoShapesFromProps(),
        },
        highlight: {
          lastMove: true,
          check: true,
        },
      });
      window.setTimeout(() => { suppressMoveCallbacks = false; }, 0);
      setStatus(`Turn: ${gameTurn() === "w" ? "White" : "Black"} | FEN: ${gameFen()}`);
      resizeBoardAndFrame();
    }

    function sendMoveEvent(prevFen, moveObj) {
      if (!Streamlit || typeof Streamlit.setComponentValue !== "function") return;
      const promotion = moveObj && moveObj.promotion ? moveObj.promotion : "";
      const uci = moveObj ? (moveObj.from + moveObj.to + promotion) : null;
      const payload = {
        instance_id: Number(currentProps.instance_id) || 0,
        prev_fen: prevFen || null,
        fen: gameFen(),
        uci: uci,
        san: moveObj && moveObj.san ? moveObj.san : null,
        seq: ++moveSeq,
      };
      const dedupeKey = payload.instance_id + "|" + (payload.fen || "") + "|" + (payload.uci || "");
      if (dedupeKey === lastSentMoveKey) return;
      lastSentMoveKey = dedupeKey;
      Streamlit.setComponentValue(payload);
    }

    function hidePromotion() {
      pendingPromotion = null;
      overlayEl.style.display = "none";
    }

    function showPromotion(orig, dest) {
      pendingPromotion = { orig, dest };
      overlayEl.style.display = "flex";
      promoteButtons[0].focus();
    }

    function isPromotionMove(orig, dest) {
      const piece = gameGet(orig);
      if (!piece || piece.type !== "p") return false;
      const targetRank = dest[1];
      return (piece.color === "w" && targetRank === "8") || (piece.color === "b" && targetRank === "1");
    }

    function applyMove(orig, dest, promotion) {
      if (!game) return;
      const prevFen = gameFen();
      const move = game.move({ from: orig, to: dest, promotion: promotion || "q" });
      if (!move) {
        syncGround();
        return;
      }
      hidePromotion();
      syncGround();
      sendMoveEvent(prevFen, move);
    }

    function onUserMove(orig, dest) {
      if (suppressMoveCallbacks || !game) return;
      if (currentProps.disabled) {
        syncGround();
        return;
      }
      if (isPromotionMove(orig, dest)) {
        // Reset visual board to the pre-move state, then ask user for promotion piece.
        syncGround();
        showPromotion(orig, dest);
        return;
      }
      applyMove(orig, dest, "q");
    }

    function initGround() {
      if (!ChessgroundFactory) {
        setStatus("Chessground failed to load.");
        return;
      }
      if (!game) {
        setStatus("chess.js failed to load.");
        return;
      }
      ground = ChessgroundFactory(boardEl, {
        orientation: currentProps.orientation,
        fen: gameFen(),
        turnColor: gameTurn() === "w" ? "white" : "black",
        movable: {
          color: currentProps.disabled ? undefined : (gameTurn() === "w" ? "white" : "black"),
          free: false,
          dests: computeDests(),
          showDests: true,
          events: { after: onUserMove },
        },
        premovable: { enabled: false },
        draggable: { enabled: !currentProps.disabled },
        drawable: { enabled: false, visible: true, autoShapes: autoShapesFromProps() },
        highlight: { lastMove: true, check: true },
      });
      syncGround();
    }

    function applyProps(args) {
      currentProps = {
        orientation: args.orientation === "black" ? "black" : "white",
        disabled: !!args.disabled,
        arrows: Array.isArray(args.arrows) ? args.arrows : [],
        last_move_uci: typeof args.last_move_uci === "string" ? args.last_move_uci : "",
        instance_id: Number.isFinite(args.instance_id) ? Math.floor(args.instance_id) : 0,
      };
      if (game && typeof args.fen === "string") {
        const incomingFen = args.fen.trim();
        if (incomingFen && incomingFen !== gameFen()) {
          const ok = gameLoadFen(incomingFen);
          if (ok) {
            lastSentMoveKey = null;
            hidePromotion();
          } else {
            setStatus("Invalid FEN received from Python.");
          }
        }
      }
    }

    function onRender(event) {
      hasRenderedOnce = true;
      const args = (event && event.detail && event.detail.args) ? event.detail.args : {};
      applyProps(args);
      if (!ground) initGround();
      else syncGround();

      if (args.height && Number.isFinite(args.height)) {
        const target = Math.max(280, Math.floor(args.height));
        boardEl.style.minHeight = target + "px";
      }
      if (Streamlit && typeof Streamlit.setFrameHeight === "function") {
        Streamlit.setFrameHeight();
      }
    }

    promoteButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (!pendingPromotion) return;
        applyMove(pendingPromotion.orig, pendingPromotion.dest, btn.dataset.piece || "q");
      });
    });
    promoteCancelEl.addEventListener("click", () => {
      hidePromotion();
      syncGround();
    });

    window.addEventListener("resize", resizeBoardAndFrame);
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => resizeBoardAndFrame());
      ro.observe(wrapEl);
    }

    let readyRetryTimer = null;
    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight();
    readyRetryTimer = window.setInterval(function () {
      if (hasRenderedOnce) {
        clearInterval(readyRetryTimer);
        readyRetryTimer = null;
        return;
      }
      Streamlit.setComponentReady();
    }, 500);
  </script>
</body>
</html>
